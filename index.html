<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blather Unit Calculator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Apple/Minimalist Dark Mode Variables */
        :root {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.75);
            --text-color: #f5f5f7;
            --accent-blue: #0a84ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Make the map take up the whole screen */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Floating, blurred UI panel */
        #ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            text-align: center;
            min-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            margin: 0 0 20px 0;
            font-size: 14px;
            color: #ebebf5;
            opacity: 0.8;
        }

        /* Minimalist Button */
        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background-color: #0071e3;
        }

        button:disabled {
            background-color: #333336;
            color: #5c5c5e;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-blue);
            display: none;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="ui-panel">
        <h1>Distance Calculator</h1>
        <p id="status-text">Click the map to select Point A.</p>
        <button id="calc-btn" disabled>Calculate Distance</button>
        <div id="result"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on the US [Latitude, Longitude], Zoom level 4
        const map = L.map('map', {
            zoomControl: false // Disable default zoom controls for a cleaner look
        }).setView([39.8283, -98.5795], 4);

        // Add zoom controls to the top right instead of top left
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Dark mode tile layer from CartoDB
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // State variables
        let pointA = null;
        let pointB = null;
        let markerA = null;
        let markerB = null;
        let polyline = null;

        const statusText = document.getElementById('status-text');
        const calcBtn = document.getElementById('calc-btn');
        const resultDiv = document.getElementById('result');

        // Handle Map Clicks
        map.on('click', function(e) {
            if (!pointA) {
                // Step 1: Set Point A
                pointA = e.latlng;
                markerA = L.marker(pointA).addTo(map);
                statusText.innerText = "Point A selected. Now select Point B.";
                resultDiv.style.display = 'none';
            } else if (!pointB) {
                // Step 2: Set Point B
                pointB = e.latlng;
                markerB = L.marker(pointB).addTo(map);
                
                // Draw a dashed line between the two points
                polyline = L.polyline([pointA, pointB], {
                    color: '#0a84ff', 
                    weight: 3, 
                    dashArray: '5, 10'
                }).addTo(map);
                
                statusText.innerText = "Points selected. Ready to calculate.";
                calcBtn.disabled = false; // Enable the button
            } else {
                // Step 3: Reset the map if they click a 3rd time
                map.removeLayer(markerA);
                map.removeLayer(markerB);
                if (polyline) map.removeLayer(polyline);
                
                pointA = e.latlng;
                pointB = null;
                markerA = L.marker(pointA).addTo(map);
                
                statusText.innerText = "Point A selected. Now select Point B.";
                calcBtn.disabled = true;
                resultDiv.style.display = 'none';
            }
        });

        // Handle the Calculate Button
        calcBtn.addEventListener('click', () => {
            if (pointA && pointB) {
                // Leaflet's built-in map.distance gives you straight-line distance in meters
                const distanceInMeters = map.distance(pointA, pointB);
                
                // The Math
                const distanceInFeet = distanceInMeters * 3.28084;
                const blatherUnits = distanceInFeet / 150;
                
                // Display the result formatted with commas and 2 decimal points
                resultDiv.innerText = `${blatherUnits.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} Blather Units`;
                
                // Update UI state
                resultDiv.style.display = 'block';
                statusText.innerText = "Click anywhere on the map to start over.";
                calcBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
