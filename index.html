<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blather Unit Calculator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Apple/Minimalist Dark Mode Variables */
        :root {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.75);
            --text-color: #f5f5f7;
            --accent-blue: #0a84ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            text-align: center;
            min-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Logo Styling */
        #logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 12px;
            border-radius: 8px; /* Optional: rounds the corners of your logo if it has a background */
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            margin: 0 0 20px 0;
            font-size: 14px;
            color: #ebebf5;
            opacity: 0.8;
        }

        /* Primary Button */
        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #0071e3;
        }

        button:disabled {
            background-color: #333336;
            color: #5c5c5e;
            cursor: not-allowed;
        }

        /* Secondary "Clear Points" Button */
        #clear-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            margin-bottom: 0;
        }

        #clear-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        #result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-blue);
            display: none;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="ui-panel">
<img id="logo" src="logo.png" alt="Site Logo">        
        <h1>Blather Unit Calculator</h1>
        <h2>1 Blather Unit = 150ft</h2>
        <p id="status-text">Click the map to select Point A.</p>
        
        <button id="calc-btn" disabled>Calculate Distance</button>
        <button id="clear-btn">Clear Points</button>
        
        <div id="result"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            zoomControl: false 
        }).setView([39.8283, -98.5795], 4);

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let pointA = null;
        let pointB = null;
        let markerA = null;
        let markerB = null;
        let polyline = null;

        const statusText = document.getElementById('status-text');
        const calcBtn = document.getElementById('calc-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultDiv = document.getElementById('result');

        // Function to wipe the board clean
        function clearPoints() {
            if (markerA) map.removeLayer(markerA);
            if (markerB) map.removeLayer(markerB);
            if (polyline) map.removeLayer(polyline);
            
            pointA = null;
            pointB = null;
            markerA = null;
            markerB = null;
            polyline = null;
            
            statusText.innerText = "Click the map to select Point A.";
            calcBtn.disabled = true;
            resultDiv.style.display = 'none';
        }

        // Attach the clear function to the new button
        clearBtn.addEventListener('click', clearPoints);

        // Handle Map Clicks
        map.on('click', function(e) {
            if (!pointA) {
                pointA = e.latlng;
                markerA = L.marker(pointA).addTo(map);
                statusText.innerText = "Point A selected. Now select Point B.";
                resultDiv.style.display = 'none';
            } else if (!pointB) {
                pointB = e.latlng;
                markerB = L.marker(pointB).addTo(map);
                
                polyline = L.polyline([pointA, pointB], {
                    color: '#0a84ff', 
                    weight: 3, 
                    dashArray: '5, 10'
                }).addTo(map);
                
                statusText.innerText = "Points selected. Ready to calculate.";
                calcBtn.disabled = false; 
            } else {
                // Now, clicking a 3rd time just starts a new measurement instead of clearing everything instantly
                clearPoints();
                pointA = e.latlng;
                markerA = L.marker(pointA).addTo(map);
                statusText.innerText = "Point A selected. Now select Point B.";
            }
        });

        // Handle the Calculate Button
        calcBtn.addEventListener('click', () => {
            if (pointA && pointB) {
                const distanceInMeters = map.distance(pointA, pointB);
                const distanceInFeet = distanceInMeters * 3.28084;
                const blatherUnits = distanceInFeet / 150;
                
                resultDiv.innerText = `${blatherUnits.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} Blather Units`;
                
                resultDiv.style.display = 'block';
                statusText.innerText = "Calculation complete.";
                calcBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
